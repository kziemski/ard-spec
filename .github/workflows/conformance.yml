name: Conformance Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run manifest validation without dependencies
      run: python -S ./conformance/bin/conformance-test manifest ./conformance/examples/ai-catalog.json

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install jsonschema

    - name: Make scripts executable
      run: |
        chmod +x ./conformance/bin/run-conformance-demo
        chmod +x ./conformance/bin/conformance-test

    - name: Run Conformance Demo
      run: ./conformance/bin/run-conformance-demo
