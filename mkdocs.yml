# Project information
site_name: Agent Finder
site_url: https://agentfinder-project.github.io/agentfinder/
site_description: Federated Discovery and Search for AI Agents and Capabilities
repo_name: agentfinder-project/agentfinder
repo_url: https://github.com/agentfinder-project/agentfinder

# Configuration
theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/logo.svg
  font:
    text: Outfit
    code: Fira Code
  palette:
    - scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.select
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow

# Extensions
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      dedent_subsections: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

# Custom CSS
extra_css:
  - stylesheets/custom.css
  - stylesheets/homepage.css

# Plugins
plugins:
  - search

# Navigation
nav:
  - Home: index.md
  - About:
    - Why Agent Finder?: why.md
    - Comparisons: comparisons.md
    - Contributors: contributors.md
    - FAQ: faq.md
  - Guides:
    - How to publish: how_to_publish.md
    - How agents search: how_agents_search.md
    - How to build a search: how_to_build_search.md
  - Specifications:
    - Agent Finder Spec: spec.md
    - AI Catalog Spec: ai_catalog_spec.md
  - Ecosystem:
    - Implementations: implementations.md
    - Open-plugins: open_plugins.md
    - Zed's ACP Agent Registry: zed_acp.md
    - Anthropic's MCP Registry: anthropic_mcp.md
